workflows:
  ios-build:
    name: FTPay iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen

      - name: Remove Assets.xcassets (avoid actool error)
        script: |
          rm -rf FTPay/Assets.xcassets
          echo "Assets.xcassets removed - using hardcoded colors only"

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Build iOS app (unsigned)
        script: |
          xcodebuild build \
            -project FTPay.xcodeproj \
            -scheme FTPay \
            -destination generic/platform=iOS \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./build

      - name: Package as IPA
        script: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/FTPay.app Payload/
          zip -r FTPay-unsigned.ipa Payload
    artifacts:
      - FTPay-unsigned.ipa
      - build/**/*.app
      - build/**/*.dSYM.zip
