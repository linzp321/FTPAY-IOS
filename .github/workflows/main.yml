name: Build FTPay iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Show Xcode version
        run: xcodebuild -version

      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      # ===== Workaround: 绕开 Xcode 16.2 + macos-15 缺 iOS 18.2 sim runtime 的 bug =====
      # actool 强制要模拟器运行时，镜像里没有、downloadPlatform 也连不上
      # 暂时移走 Assets.xcassets，xcodegen 不会再生成对它的引用，actool 就不会被触发
      - name: Move Assets.xcassets aside
        run: |
          if [ -d "FTPay/Assets.xcassets" ]; then
            mv FTPay/Assets.xcassets FTPay/Assets.xcassets.disabled
            echo "✓ Assets.xcassets moved aside"
          else
            echo "Assets.xcassets not present, skipping"
          fi

      - name: Strip Assets reference from project.yml
        run: |
          sed -i.bak '/Assets\.xcassets/d' project.yml
          echo "--- project.yml after edit ---"
          cat project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify project generated
        run: ls FTPay.xcodeproj/project.pbxproj

      - name: Build unsigned (iOS Device)
        run: |
          xcodebuild build \
            -project FTPay.xcodeproj \
            -scheme FTPay \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./build

      - name: Verify .app built
        run: ls build/Build/Products/Debug-iphoneos/FTPay.app/FTPay

      - name: Package as unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/FTPay.app Payload/
          zip -r FTPay-unsigned.ipa Payload
          ls -la FTPay-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTPay-unsigned
          path: FTPay-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
