name: Build FTPay iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Show Xcode version
        run: xcodebuild -version

      # 关键步骤：补装 iOS 18.2 simulator runtime
      # 这是修复 actool 报"No simulator runtime available"的根因
      # 首次下载约 3-5 分钟，下载后会缓存
      - name: Install iOS simulator runtime
        run: |
          echo "Downloading iOS simulator runtime (this may take a few minutes)..."
          xcodebuild -downloadPlatform iOS
        timeout-minutes: 15

      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify project generated
        run: ls FTPay.xcodeproj/project.pbxproj

      - name: Build unsigned (iOS Device)
        run: |
          xcodebuild build \
            -project FTPay.xcodeproj \
            -scheme FTPay \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./build

      - name: Verify .app built
        run: ls build/Build/Products/Debug-iphoneos/FTPay.app/FTPay

      - name: Package as unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Debug-iphoneos/FTPay.app Payload/
          zip -r FTPay-unsigned.ipa Payload
          ls -la FTPay-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTPay-unsigned
          path: FTPay-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
